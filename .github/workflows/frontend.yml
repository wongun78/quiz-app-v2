# =============================================================================
# frontend.yml — CI/CD cho React/Vite frontend
#
# Trigger: push lên main khi có thay đổi trong client/ hoặc file này
#
# Luồng:
#   1. [test]              → lint + type check + build validation
#   2. [build-and-deploy]  → lấy backend URL động từ gcloud, build Docker
#                            image (linux/amd64 + VITE_API_BASE_URL baked in),
#                            push Artifact Registry, deploy Cloud Run,
#                            update CORS trên backend (--update-env-vars!)
#
# Trick quan trọng: VITE_API_BASE_URL phải biết lúc BUILD (Vite bundle tĩnh)
# → luôn lấy URL từ backend service đang chạy trên Cloud Run
# =============================================================================
name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "client/**"
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  SERVICE_NAME: quiz-frontend
  BACKEND_SERVICE_NAME: quiz-backend
  IMAGE: asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/quiz-repo/frontend

# =============================================================================
# JOB 1: Lint + Type Check + Build validation
# =============================================================================
jobs:
  test:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Cache node_modules theo package-lock.json → không cần `npm ci` lại
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check (TypeScript)
        run: npx tsc --noEmit

      # Build với placeholder URL — chỉ để validate build không lỗi
      # URL thật sẽ được dùng trong job deploy
      - name: Build validation
        run: npm run build
        env:
          VITE_API_BASE_URL: https://placeholder.run.app/api/v1

  # =============================================================================
  # JOB 2: Build Docker image và Deploy lên Cloud Run
  # =============================================================================
  build-and-deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: test

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      # Lấy backend URL thật từ Cloud Run service đang chạy
      # → bake vào VITE_API_BASE_URL lúc Docker build
      - name: Get Backend URL
        id: backend
        run: |
          URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE_NAME }} \
            --region="${{ env.REGION }}" \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Backend URL: $URL"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          platforms: linux/amd64
          push: true
          # VITE_API_BASE_URL được bake vào JavaScript bundle lúc build
          # Nếu URL thay đổi → phải rebuild image mới
          build-args: |
            VITE_API_BASE_URL=${{ steps.backend.outputs.url }}/api/v1
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image="${{ env.IMAGE }}:${{ github.sha }}" \
            --region="${{ env.REGION }}" \
            --service-account="${{ secrets.WIF_SERVICE_ACCOUNT }}" \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2 \
            --port=8080 \
            --allow-unauthenticated

      - name: Get Frontend URL
        id: frontend
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region="${{ env.REGION }}" \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Frontend URL: $URL"

      # Update CORS trên backend với frontend URL mới
      # QUAN TRỌNG: --update-env-vars (không phải --set-env-vars!)
      # --set-env-vars sẽ XÓA HẾT env vars khác (DB, Redis, v.v.)
      # --update-env-vars chỉ ADD/MODIFY biến được chỉ định
      - name: Update CORS on Backend
        run: |
          gcloud run services update ${{ env.BACKEND_SERVICE_NAME }} \
            --region="${{ env.REGION }}" \
            --update-env-vars="CORS_ALLOWED_ORIGINS=${{ steps.frontend.outputs.url }}"

      - name: Summary
        run: |
          echo "## Frontend Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ env.SERVICE_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ steps.frontend.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend API | ${{ steps.backend.outputs.url }}/api/v1 |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
